<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>docket</title>
<link rel="stylesheet" href="/styles.css">
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" integrity="sha384-hpCHZMG3BTQEFGmK/GhJFiOWfDLT0dPKMpYuIvQ8FtLo7k0AMI7CYucMEkkp4k94" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" integrity="sha384-J7BSuMQ7EVopXhoLKEa5d0LENJrONkHNnRJw1KzLqCBWotFK8nGR8Gg0sjWyl6Iy" crossorigin="anonymous"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">Dashboards</div>
    <div id="sidebar-items"></div>
  </aside>
  <main class="main">
    <div class="top-bar">
      <button class="sidebar-toggle" id="sidebar-toggle" type="button" aria-label="Toggle sidebar">
        <span aria-hidden="true">☰</span> Dashboards
      </button>
      <div class="refresh-control">
        <label><input type="checkbox" id="auto-refresh"> Auto refresh?</label>
        <svg class="refresh-ring" id="refresh-ring" viewBox="0 0 20 20" aria-hidden="true">
          <circle class="track" cx="10" cy="10" r="8"></circle>
          <circle class="fill" id="refresh-ring-fill" cx="10" cy="10" r="8"
            stroke-dasharray="50.265" stroke-dashoffset="50.265"></circle>
        </svg>
        <span class="top-meta" id="generated"></span>
      </div>
    </div>
    <div id="content"></div>
  </main>
</div>
<script src="/app.js"></script>
</body>
</html>
