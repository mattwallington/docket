<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="done" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d977"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="progress" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d977"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="check-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feComposite in2="SourceGraphic" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded squircle background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <rect x="4" y="4" width="1016" height="1016" rx="220" fill="none" stroke="#334155" stroke-width="2" opacity="0.6"/>

  <!-- Three task rows forming the identity of docket -->
  <g>
    <!-- Row 1: done -->
    <circle cx="272" cy="332" r="58" fill="url(#done)" filter="url(#check-shadow)"/>
    <path d="M 243 332 L 266 356 L 304 314"
          stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="378" y="308" width="384" height="48" rx="24" fill="#64748b" opacity="0.85"/>

    <!-- Row 2: pending (amber ring) -->
    <circle cx="272" cy="512" r="54" fill="none" stroke="#f59e0b" stroke-width="12"/>
    <rect x="378" y="488" width="456" height="48" rx="24" fill="#334155"/>

    <!-- Row 3: pending (neutral) -->
    <circle cx="272" cy="692" r="54" fill="none" stroke="#64748b" stroke-width="12"/>
    <rect x="378" y="668" width="320" height="48" rx="24" fill="#334155"/>
  </g>

  <!-- Progress bar — roughly 1/3 filled matching one-of-three done -->
  <g transform="translate(200, 836)">
    <rect x="0" y="0" width="624" height="20" rx="10" fill="#0b1220" stroke="#334155" stroke-width="1.5"/>
    <rect x="2" y="2" width="204" height="16" rx="8" fill="url(#progress)"/>
  </g>
</svg>
