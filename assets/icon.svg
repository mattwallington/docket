<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="done" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d977"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="progress" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d977"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <!-- macOS Big Sur icon template: 824x824 squircle centered in 1024x1024,
       corner radius 185 (~22.5% of squircle edge). Transparent padding
       ensures consistency with other Dock icons. -->
  <g transform="translate(100 100)">
    <rect width="824" height="824" rx="185" fill="url(#bg)"/>
    <rect x="2" y="2" width="820" height="820" rx="183" fill="none" stroke="#334155" stroke-width="2" opacity="0.5"/>

    <!-- Content scaled into the 824x824 region (positions expressed in the
         translated coordinate system). -->
    <g>
      <!-- Row 1: done -->
      <circle cx="172" cy="250" r="48" fill="url(#done)"/>
      <path d="M 149 250 L 167 270 L 198 232"
            stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <rect x="258" y="228" width="336" height="44" rx="22" fill="#64748b" opacity="0.85"/>

      <!-- Row 2: pending (amber ring) -->
      <circle cx="172" cy="412" r="44" fill="none" stroke="#f59e0b" stroke-width="10"/>
      <rect x="258" y="390" width="396" height="44" rx="22" fill="#334155"/>

      <!-- Row 3: pending (neutral ring) -->
      <circle cx="172" cy="574" r="44" fill="none" stroke="#64748b" stroke-width="10"/>
      <rect x="258" y="552" width="280" height="44" rx="22" fill="#334155"/>

      <!-- Progress bar — ~1/3 filled, matching 1-of-3 done -->
      <rect x="104" y="686" width="540" height="18" rx="9" fill="#0b1220" stroke="#334155" stroke-width="1.5"/>
      <rect x="106" y="688" width="180" height="14" rx="7" fill="url(#progress)"/>
    </g>
  </g>
</svg>
